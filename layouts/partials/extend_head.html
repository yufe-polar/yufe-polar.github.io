<style>
/* Dark mode logo swap — two-img approach (reliable cross-browser) */
.logo a img.logo-dark { display: none; }
body.dark .logo a img.logo-light { display: none; }
body.dark .logo a img.logo-dark { display: inline; }

/* Dark mode talk title → pure white (beat typography.css .dark p !important) */
body.dark .speaker-abstract > p:first-child,
body.dark .speaker-block .speaker-abstract > p:first-child {
  color: #ffffff !important;
}
</style>
