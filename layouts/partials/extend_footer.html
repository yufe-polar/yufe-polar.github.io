<script src="/js/tabs.js"></script>

<script>
/* ── POLAR logo dark/light switching ────────────────────────────
   Swaps logo src when the PaperMod theme toggle changes
   data-theme on <html>. No CSS filter hacks needed.
──────────────────────────────────────────────────────────────── */
(function () {
  var LIGHT = '/images/polar-logo.png';
  var DARK  = '/images/polar-logo-white-transparent.png';

  function applyLogo() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    var src  = dark ? DARK : LIGHT;
    // Header logo rendered by PaperMod
    var headerImg = document.querySelector('.header .logo a img');
    if (headerImg) headerImg.src = src;
    // Homepage hero logo (layouts/index.html)
    var heroImg = document.querySelector('.logo-img');
    if (heroImg) heroImg.src = src;
  }

  // Apply on load (DOM is ready since this is in the footer)
  applyLogo();

  // Re-apply whenever the theme attribute changes (user toggles dark/light)
  new MutationObserver(applyLogo).observe(
    document.documentElement,
    { attributes: true, attributeFilter: ['data-theme'] }
  );
})();
</script>
